<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的作品集 · 导航站</title>
    
    <!-- 公共样式 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* 页面容器样式 */
        #pageContainer {
            width: 100%;
            min-height: 100vh;
        }
        
        /* 页面切换动画 */
        .page-transition-enter {
            animation: pageEnter 0.3s ease-out forwards;
        }
        
        .page-transition-exit {
            animation: pageExit 0.15s ease-out forwards;
        }
        
        @keyframes pageEnter {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pageExit {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-5px);
            }
        }
    </style>
</head>
<body>
    
    <!-- 全局固定的左上角文字 -->
    <div id="cornerLogo" class="corner-logo" style="display: none;">BUGCODE</div>

    <!-- 页面加载蒙层背景 -->
    <div id="pageOverlayBg" class="page-overlay-bg"></div>
    
    <!-- 页面加载蒙层文字 -->
    <div class="page-overlay">
        <div id="movingText" class="moving-text">BUGCODE</div>
    </div>

    <!-- 动态页面容器 -->
    <div id="pageContainer"></div>

    <!-- 全局边缘阴影 -->
    <div class="edge-shadow"></div>

    <script src="js/router.js"></script>
    <script>
        // 蒙层动画
        window.addEventListener('load', function() {
            const overlayBg = document.getElementById('pageOverlayBg');
            const movingText = document.getElementById('movingText');
            const cornerLogo = document.getElementById('cornerLogo');
            
            if (movingText) movingText.classList.add('move-to-corner');
            if (overlayBg) overlayBg.classList.add('hide');
            
            setTimeout(() => {
                if (overlayBg) overlayBg.remove();
                if (cornerLogo) cornerLogo.classList.add('show');
                // if (movingText) movingText.classList.add('hide');
            }, 1000);
        });
    </script>
</body>
</html>
