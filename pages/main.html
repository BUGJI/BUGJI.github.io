<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页 - 我的作品集</title>
    <style>
        /* 第一页专属样式 */
        .home-container {
            display: flex;
            min-height: 100vh;
            background-color: #191919;
            height: 100vh;
        }
        
        /* 左侧正方形区域 */
        .home-square-left {
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
        }
        
        .home-square-content {
            text-align: center;
            padding: 40px;
        }
        
        
        .home-square-content p {
            color: #aaa;
            line-height: 1.6;
            margin-top: 20px;
        }
        
        .home-decoration {
            width: 400px;
            height: 300px;
            margin: 30px auto;
            border: 1px solid #eee;
            animation: expand-home-decoration 1.5s ease-out forwards;
            text-align: left;
            overflow: hidden;
            white-space: nowrap;
            word-break: keep-all;
            color:#eee;
            font-family: 'consolas', monospace;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .home-terminal-content {
            word-break: keep-all;
            white-space: nowrap;
            overflow: hidden;
            padding: 5px;
            height: calc(100% - 30px); /* 减去标题栏高度 */
            scroll-behavior: auto; /* 禁用平滑滚动 */
            width: 100%;
            white-space: nowrap;
        }

        @keyframes expand-home-decoration {
            1% {
                width: 0px;
                height: 0px;
            }
            100% {
                width: 400px;
                height: 300px;
            }
        }

        
        /* 右侧内容区域 */
        .home-content-right {
            width: 600px;
            padding: 80px 40px;
            min-height: 100vh;
        }
        
        /* 导航菜单 */
        .home-nav {
            margin-top: 40px;
            display: flex;
            gap: 10px;
            flex-direction: column;
        }
        
        .home-nav a {
            color: #eee;
            text-decoration: none;
            padding: 5px 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 0.9em;
            border: 1px dashed #00000000;
        }
        
        .home-nav a:hover {
            border: 1px dashed rgb(57, 57, 57);
            background: #bbb;
            color: #111;
        }
        
        .home-nav a.active {
            background: #262626;
            color: white;
        }
        
        /* 主内容样式 */
        .home-main {
            padding: 0;
            min-height: auto;
        }
        
        .home-footer {
            margin-top: 60px;
            text-align: center;
            padding: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .home-square-left {
                display: none;
            }
            .home-content-right {
                width: 100%;
                padding: 60px 30px;
            }
            #movingText{
                opacity: 0;
            }
            .home-nav {
                top: 10px;
                right: 15px;
                gap: 10px;
                padding: 8px 15px;
            }
        }
        
        /* 左上角文字 */
        .home-corner-logo {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 1.5em;
            font-weight: bold;
            color: #eee;
            letter-spacing: 4px;
            z-index: 101;
            pointer-events: none;

        }
        
        .home-decoration .content{
            margin: 0;
            padding: 0;
            animation: typing 3s steps(40) forwards;
        }
        #terminal-input {
            background-color: #0000;
            color: #eee;
            border: none;
            outline: none;
            font-family: monospace;
            flex-grow: 1;
            font-family: consolas;
            font-size: 15px;
            margin: -1px 0px -1px 2px;
        }
        .home-nav-extra {
            font-size: 1em;
        }
        .home-nav-extra p{
            margin-top: 10px;
        }
        .home-nav-extra a{
            color: #eee; text-decoration: none;
            margin: 0;
            padding:0;
        }
        .home-nav-social{
            text-align: right;
            margin-top: 10px;
        }
        .home-nav-social a {
            color: #eee;
            font-size: 1.3em;
            text-decoration: none;
            transition: color 0.3s ease;
            margin: 5px;
        }
    </style>
</head>
<body>

        </div>
    </div>
    <script>
        // 修改动画结束监听部分
        const decoration = document.querySelector('.home-decoration');
        const terminalContent = document.querySelector('.home-terminal-content');

        decoration.addEventListener('animationend', () => {
            // 重置滚动位置到左上角
            if (terminalContent) {
                terminalContent.scrollLeft = 0;
                terminalContent.scrollTop = 0;
            }
            const terminalInput = document.getElementById('terminal-input');
            if (terminalInput) {
                terminalInput.focus();
            }
        });
    </script>
    <script>
        const container = document.querySelector('.home-decoration');
        const content = document.querySelector('.home-square-content');

        // 添加过渡效果（关键修复）
        content.style.transition = 'transform 0.3s ease-out';
        
        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            
            // 计算鼠标相对于容器的位置 (0-1 范围)
            const mouseX = (e.clientX - rect.left) / rect.width;
            const mouseY = (e.clientY - rect.top) / rect.height;
            
            // 计算倾斜角度（最大倾斜 ±15 度）
            const maxTilt = 15;
            const rotateY = (mouseX - 0.5) * maxTilt * 2;  // 左右倾斜
            const rotateX = (0.5 - mouseY) * maxTilt * 2;  // 上下倾斜
            
            // 应用 3D 变换，移动时移除过渡以保持跟手感
            content.style.transition = 'transform 0.05s linear';
            content.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        container.addEventListener('mouseleave', () => {
            // 鼠标离开时恢复平滑过渡并复位
            content.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
            content.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
        });

    </script>
    <script>
        // 设置输入框焦点
        window.addEventListener('DOMContentLoaded', () => {
            const terminalInput = document.getElementById('terminal-input');
            
            // 监听动画结束事件，在动画完成后获得焦点
            const decoration = document.querySelector('.home-decoration');
            decoration.addEventListener('animationend', () => {
                terminalInput.focus();
            });
        });

        // 原有的鼠标倾斜交互代码
        const containerd = document.querySelector('.home-decoration');
        const content = document.querySelector('.home-square-content');

        content.style.transition = 'transform 0.3s ease-out';
        
        containerd.addEventListener('mousemove', (e) => {
            const rect = containerd.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) / rect.width;
            const mouseY = (e.clientY - rect.top) / rect.height;
            const maxTilt = 15;
            const rotateY = (mouseX - 0.5) * maxTilt * 2;
            const rotateX = (0.5 - mouseY) * maxTilt * 2;
            content.style.transition = 'transform 0.05s linear';
            content.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        containerd.addEventListener('mouseleave', () => {
            content.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
            content.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
        });
    </script>
